<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Enrollment Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h1>Course Enrollment Form</h1>

        <form action="#" method="POST">

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" required>

            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" placeholder="9876543210" required>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob" name="dob" required>

            <label for="course">Select Course</label>
            <select id="course" name="course" required>
                <option value="">-- Choose a course --</option>
                <option value="html-css">HTML & CSS Basics</option>
                <option value="javascript">JavaScript Fundamentals</option>
                <option value="python">Python Programming</option>
                <option value="webdev">Full Stack Web Development</option>
            </select>

            <label>Preferred Mode of Learning</label>
            <div class="radio-group">
                <input type="radio" id="online" name="mode" value="online" checked>
                <label for="online">Online</label>

                <input type="radio" id="offline" name="mode" value="offline">
                <label for="offline">Offline</label>
            </div>

            <label for="address">Address</label>
            <textarea id="address" name="address" rows="3" placeholder="Enter your address"></textarea>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the terms and conditions</label>
            </div>

            <button type="submit">Enroll Now</button>

        </form>
    </div>

</body>
</html>
